<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-arch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent-arch" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ec4b6"/>
      <stop offset="100%" style="stop-color:#1a936f"/>
    </linearGradient>
    <filter id="shadow-arch" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg-arch)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#2ec4b6" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold">SYSTEM ARCHITECTURE</text>

  <!-- Layer 1: Essay Input -->
  <rect x="30" y="50" width="140" height="50" rx="8" fill="#1e2a45" stroke="#2ec4b6" stroke-width="1.5" filter="url(#shadow-arch)"/>
  <text x="100" y="72" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📄 Essay Input</text>
  <text x="100" y="88" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">.txt / .md / paste</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="75" x2="210" y2="75" stroke="#2ec4b6" stroke-width="2" marker-end="url(#arrowhead-arch)"/>
  <defs>
    <marker id="arrowhead-arch" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ec4b6"/>
    </marker>
  </defs>

  <!-- Layer 2: CLI / Streamlit -->
  <rect x="215" y="45" width="130" height="28" rx="6" fill="#1e2a45" stroke="#2ec4b6" stroke-width="1.5" filter="url(#shadow-arch)"/>
  <text x="280" y="64" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">⌨️ CLI (Click)</text>

  <rect x="215" y="78" width="130" height="28" rx="6" fill="#1e2a45" stroke="#2ec4b6" stroke-width="1.5" filter="url(#shadow-arch)"/>
  <text x="280" y="97" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">🌐 Streamlit UI</text>

  <!-- Arrow 2 -->
  <line x1="345" y1="75" x2="390" y2="75" stroke="#2ec4b6" stroke-width="2" marker-end="url(#arrowhead-arch)"/>

  <!-- Layer 3: EssayGrader Core -->
  <rect x="395" y="45" width="170" height="60" rx="10" fill="#0d2137" stroke="#2ec4b6" stroke-width="2.5" filter="url(#shadow-arch)"/>
  <text x="480" y="70" text-anchor="middle" fill="#2ec4b6" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🧠 EssayGrader</text>
  <text x="480" y="88" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">Core Engine</text>

  <!-- Arrow 3 -->
  <line x1="565" y1="75" x2="610" y2="75" stroke="#2ec4b6" stroke-width="2" marker-end="url(#arrowhead-arch)"/>

  <!-- Layer 4: Ollama / Gemma -->
  <rect x="615" y="50" width="155" height="50" rx="8" fill="#1e2a45" stroke="#1a936f" stroke-width="1.5" filter="url(#shadow-arch)"/>
  <text x="692" y="72" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🤖 Ollama</text>
  <text x="692" y="88" text-anchor="middle" fill="#2ec4b6" font-family="Segoe UI,Arial,sans-serif" font-size="10">Gemma 3 (Local LLM)</text>

  <!-- Vertical arrows from Core to modules -->
  <line x1="420" y1="105" x2="420" y2="145" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead-arch)"/>
  <line x1="480" y1="105" x2="480" y2="145" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead-arch)"/>
  <line x1="540" y1="105" x2="540" y2="145" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead-arch)"/>

  <!-- More vertical arrows -->
  <line x1="130" y1="105" x2="130" y2="145" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead-arch)" stroke-dasharray="4,3"/>
  <line x1="280" y1="105" x2="280" y2="145" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead-arch)" stroke-dasharray="4,3"/>

  <!-- Row 2: Processing Modules -->
  <!-- Rubric Engine -->
  <rect x="30" y="150" width="190" height="70" rx="8" fill="#1e2a45" stroke="#2ec4b6" stroke-width="1.5" filter="url(#shadow-arch)"/>
  <text x="125" y="172" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📋 Rubric Engine</text>
  <text x="125" y="190" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">academic • creative_writing</text>
  <text x="125" y="204" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">argumentative • narrative</text>
  <text x="125" y="214" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">research_paper</text>

  <!-- Annotation Generator -->
  <rect x="235" y="150" width="160" height="70" rx="8" fill="#1e2a45" stroke="#2ec4b6" stroke-width="1.5" filter="url(#shadow-arch)"/>
  <text x="315" y="172" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">✏️ Annotations</text>
  <text x="315" y="190" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">InlineAnnotation</text>
  <text x="315" y="204" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">info | warning | error</text>

  <!-- Plagiarism Checker -->
  <rect x="410" y="150" width="160" height="70" rx="8" fill="#1e2a45" stroke="#2ec4b6" stroke-width="1.5" filter="url(#shadow-arch)"/>
  <text x="490" y="172" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🔍 Plagiarism</text>
  <text x="490" y="190" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">PlagiarismIndicator</text>
  <text x="490" y="204" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">suspicious passages</text>

  <!-- Grade Distribution -->
  <rect x="585" y="150" width="185" height="70" rx="8" fill="#1e2a45" stroke="#2ec4b6" stroke-width="1.5" filter="url(#shadow-arch)"/>
  <text x="677" y="172" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📊 Distribution</text>
  <text x="677" y="190" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">GradeDistribution</text>
  <text x="677" y="204" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">mean • median • std</text>

  <!-- Vertical arrows from modules to output -->
  <line x1="125" y1="220" x2="125" y2="260" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead-arch)" stroke-dasharray="4,3"/>
  <line x1="315" y1="220" x2="315" y2="260" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead-arch)" stroke-dasharray="4,3"/>
  <line x1="490" y1="220" x2="490" y2="260" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead-arch)" stroke-dasharray="4,3"/>
  <line x1="677" y1="220" x2="677" y2="260" stroke="#2ec4b6" stroke-width="1.5" marker-end="url(#arrowhead-arch)" stroke-dasharray="4,3"/>

  <!-- Row 3: Output Layer -->
  <rect x="30" y="265" width="740" height="55" rx="8" fill="#0d2137" stroke="#1a936f" stroke-width="1.5" filter="url(#shadow-arch)"/>
  <text x="400" y="287" text-anchor="middle" fill="#2ec4b6" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">📦 Export &amp; Reports</text>
  <text x="400" y="307" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="10">GradeResult → JSON • Markdown • Console Output • Batch Reports</text>

  <!-- Row 4: Config -->
  <rect x="30" y="335" width="360" height="45" rx="8" fill="#1e2a45" stroke="#2ec4b6" stroke-width="1" filter="url(#shadow-arch)"/>
  <text x="210" y="355" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">⚙️ ConfigManager (Singleton)</text>
  <text x="210" y="370" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">config.yaml • llm.temperature • grading.default_rubric</text>

  <rect x="410" y="335" width="360" height="45" rx="8" fill="#1e2a45" stroke="#2ec4b6" stroke-width="1" filter="url(#shadow-arch)"/>
  <text x="590" y="355" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">📏 Grade Scale</text>
  <text x="590" y="370" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">A+ (97) → A (93) → A- (90) → ... → F (&lt;60)</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="392" width="800" height="8" fill="url(#accent-arch)" rx="0"/>
</svg>
